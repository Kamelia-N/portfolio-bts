<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Kali Linux en machine virtuelle</title>
  <desc id="desc">Illustration d'une machine virtuelle Kali Linux pour la cybersécurité.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset=".62" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#075985"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1222"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <path d="M0 645C175 560 260 625 420 555C585 482 720 500 870 420C1010 345 1110 330 1200 360V800H0Z" fill="#082f49" opacity=".55"/>
  <circle cx="930" cy="165" r="140" fill="#38bdf8" opacity=".12"/>
  <g filter="url(#shadow)">
    <rect x="145" y="130" width="910" height="540" rx="36" fill="url(#card)" stroke="#1e3a8a" stroke-width="3"/>
    <rect x="195" y="190" width="810" height="420" rx="24" fill="#020617" stroke="#164e63" stroke-width="3"/>
    <rect x="195" y="190" width="810" height="62" rx="24" fill="#0f172a"/>
    <circle cx="235" cy="221" r="10" fill="#ef4444"/>
    <circle cx="265" cy="221" r="10" fill="#f59e0b"/>
    <circle cx="295" cy="221" r="10" fill="#22c55e"/>
    <text x="810" y="229" fill="#94a3b8" font-family="Consolas, monospace" font-size="20">Kali Linux VM</text>
    <path d="M384 336c54-42 108-42 162 0l-32 38c-32-25-66-25-98 0z" fill="#38bdf8"/>
    <path d="M355 420c72-64 150-64 222 0l-42 50c-44-38-94-38-138 0z" fill="#38bdf8" opacity=".86"/>
    <path d="M420 530h92l-46-92z" fill="#e2e8f0"/>
    <circle cx="466" cy="410" r="34" fill="#0f172a" stroke="#38bdf8" stroke-width="10"/>
    <rect x="625" y="330" width="300" height="185" rx="18" fill="#111827" stroke="#334155" stroke-width="3"/>
    <text x="655" y="378" fill="#22c55e" font-family="Consolas, monospace" font-size="24">root@kali:~#</text>
    <text x="655" y="428" fill="#e2e8f0" font-family="Consolas, monospace" font-size="23">nmap -sV</text>
    <text x="655" y="478" fill="#38bdf8" font-family="Consolas, monospace" font-size="23">security lab</text>
    <text x="290" y="595" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="35" font-weight="800">Kali Linux</text>
    <text x="625" y="595" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700">Virtualisation et cybersécurité</text>
  </g>
</svg>
