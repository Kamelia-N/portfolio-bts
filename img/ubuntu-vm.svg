<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Ubuntu sur VMware Workstation</title>
  <desc id="desc">Illustration d'une machine virtuelle Ubuntu dédiée à l'apprentissage Linux.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset=".55" stop-color="#fed7aa"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#7c2d12" flood-opacity=".2"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="1060" cy="170" r="130" fill="#fb923c" opacity=".22"/>
  <circle cx="140" cy="655" r="160" fill="#f97316" opacity=".16"/>
  <g filter="url(#shadow)">
    <rect x="145" y="130" width="910" height="540" rx="36" fill="#ffffff"/>
    <rect x="190" y="185" width="820" height="420" rx="24" fill="#111827"/>
    <rect x="190" y="185" width="820" height="62" rx="24" fill="#1f2937"/>
    <circle cx="230" cy="216" r="10" fill="#ef4444"/>
    <circle cx="260" cy="216" r="10" fill="#f59e0b"/>
    <circle cx="290" cy="216" r="10" fill="#22c55e"/>
    <text x="820" y="224" fill="#cbd5e1" font-family="Consolas, monospace" font-size="20">VMware Workstation</text>
    <circle cx="420" cy="420" r="108" fill="#e95420"/>
    <circle cx="420" cy="420" r="44" fill="#111827"/>
    <circle cx="420" cy="288" r="30" fill="#e95420"/>
    <circle cx="308" cy="486" r="30" fill="#e95420"/>
    <circle cx="532" cy="486" r="30" fill="#e95420"/>
    <path d="M420 318v58M333 472l50-30M507 472l-50-30" stroke="#e95420" stroke-width="24" stroke-linecap="round"/>
    <rect x="625" y="320" width="300" height="190" rx="18" fill="#020617" stroke="#334155" stroke-width="3"/>
    <text x="655" y="368" fill="#22c55e" font-family="Consolas, monospace" font-size="25">kamelia@ubuntu:~$</text>
    <text x="655" y="420" fill="#e2e8f0" font-family="Consolas, monospace" font-size="24">ls -la</text>
    <text x="655" y="470" fill="#38bdf8" font-family="Consolas, monospace" font-size="24">sudo apt update</text>
    <text x="275" y="595" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Ubuntu VM</text>
    <text x="625" y="595" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Apprentissage des commandes Linux</text>
  </g>
</svg>
